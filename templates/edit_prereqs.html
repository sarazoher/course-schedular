{% extends "base.html" %}

{% block content %}
  <h2>Prerequisites - {{ course.code }}</h2>
  <p class="text-muted">Select one or more courses that must come before this one.</p>

  <form methods="POST" class="mt-3">
    {% for c in all_courses %}
      {% if c.id != course.id %}
        <div class="form-check mb-1">
          <input class="form-check-input"
                 type="checkbox"
                 id="c{{ c.id }}"
                 name="prereqs"
                 value="{{ c.id }}"
                 {% if c.id in existing_prereqs %}checked{% endif %}>
          <label class="form-check-label" for="c{{ c.id }}">
            {{ c.code }} - {{ c.name }}
          </label>
        </div>
      {% endif %}
    {% endfor %}

    <button class="btn btn-primary mt-3">Save Prerequisites</button>
    <a href="{{ url_for('main.view_plan', plan_id=plan.id) }}"
       class="btn btn-secondary mt-3">Cancel</a>
  </form>
{% endblock %}
