{% extends "base.html" %}

{% block content %}
  <h2>Plan Constraints - {{ plan.name }}</h2>

  <form methods="POST" class="mt-3" style="max-width: 500px;">
    <div class="mb-3">
      <label for="total_semesters" class="form-label">Total Semesters</label>
      <input type="number" min="1" id="total_semesters" name="total_semesters"
             value="{{ pc.total_semesters }}" class="form-control">
    </div>

    <div class="mb-3">
      <label for="max_credits_per_semester" class="form-label">
        Max Credits Per Semester (optional)
      </label>
      <input type="number" id="max_credits_per_semester"
             name="max_credits_per_semester"
             class="form-control"
             value="{{ pc.max_credits_per_semester or '' }}">
      <small class="text-muted">
        Leave empty to disable credit limits.
      </small>
    </div>

    <button class="btn btn-primary">Save Constraints</button>
    <a href="{{ url_for('main.view_plan', plan_id=plan.id) }}"
       class="btn btn-secondary">Cancel</a>
  </form>
{% endblock %}
