{% extends "base.html" %}

{% block content %}
  <h2>Allowed Semesters - {{ course.code }}</h2>
  <p class="text-muted">Choose which semesters this course can be placed in.</p>

  <form methods="POST" class="mt-3">
    {% for sem in range(1, total_semesters + 1) %}
      <div class="form-check mb-1">
        <input class="form-check-input"
               type="checkbox"
               id="sem{{ sem }}"
               name="semesters"
               value="{{ sem }}"
               {% if sem in selected_semesters %}checked{% endif %}>
        <label class="form-check-label" for="sem{{ sem }}">
          Semester {{ sem }}
        </label>
      </div>
    {% endfor %}

    <button class="btn btn-primary mt-3">Save Offerings</button>
    <a class="btn btn-secondary mt-3" href="{{ url_for('main.view_plan', plan_id=plan.id) }}">
      Cancel
    </a>
  </form>
{% endblock %}
